<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Prabal Kanti Khan</title>
  <meta name="theme-color" content="#e9eefb" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .err{ min-height:100vh; min-height:100svh; display:grid; place-items:center; text-align:center; padding:40px 20px; position:relative; z-index:1; }
    .err__card{ max-width:620px; background:var(--card); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:16px; padding:36px 32px; box-shadow:0 18px 50px rgba(27,33,80,.12); }
    .err__code{ font-family:var(--sans); font-weight:300; font-size:clamp(3rem,14vw,6rem); line-height:1; color:var(--ink2); letter-spacing:.02em; }
    .err__sig{ font-family:var(--mono); color:var(--accent); letter-spacing:.14em; font-size:.8rem; margin-top:4px; }
    .err__msg{ font-family:var(--mono); font-size:.82rem; line-height:1.7; margin:22px 0 6px; white-space:pre-wrap; text-align:left; background:#0a1226; border:1px solid #22305c; border-radius:10px; padding:16px; color:#9db4ff; }
    .err__msg .c{ color:#7fe7ff; } .err__msg .g{ color:#2fc46b; } .err__msg .a{ color:#f4c20d; }
    .err__btns{ margin-top:26px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <main class="err">
    <div class="err__card">
      <p class="err__code">404</p>
      <p class="err__sig">PAGE NOT MAPPED</p>
      <pre class="err__msg"><span class="c">$</span> fetch <span class="a">requested_route</span>
<span class="c">&gt;</span> reading address <span class="a">0xDEADBEEF</span> …
<span class="c">&gt;</span> <span class="g">FAULT</span>: this resource doesn't exist.
<span class="c">&gt;</span> recovering → redirecting to <span class="g">/</span></pre>
      <div class="err__btns">
        <a href="/" class="btn btn--solid">↩ Return home</a>
        <a href="contact.html" class="btn btn--ghost">Contact ▸</a>
      </div>
    </div>
  </main>
</body>
</html>
