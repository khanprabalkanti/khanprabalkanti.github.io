<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PKK chip icon">
  <rect width="64" height="64" rx="12" fill="#060a12"/>
  <!-- pins -->
  <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round">
    <line x1="20" y1="10" x2="20" y2="18"/><line x1="32" y1="10" x2="32" y2="18"/><line x1="44" y1="10" x2="44" y2="18"/>
    <line x1="20" y1="46" x2="20" y2="54"/><line x1="32" y1="46" x2="32" y2="54"/><line x1="44" y1="46" x2="44" y2="54"/>
    <line x1="10" y1="20" x2="18" y2="20"/><line x1="10" y1="32" x2="18" y2="32"/><line x1="10" y1="44" x2="18" y2="44"/>
    <line x1="46" y1="20" x2="54" y2="20"/><line x1="46" y1="32" x2="54" y2="32"/><line x1="46" y1="44" x2="54" y2="44"/>
  </g>
  <!-- chip body -->
  <rect x="18" y="18" width="28" height="28" rx="5" fill="#0c1322" stroke="#0891b2" stroke-width="2"/>
  <!-- core node -->
  <circle cx="32" cy="32" r="7" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#22d3ee"/>
</svg>
